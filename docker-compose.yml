services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "127.0.0.1:18080:80"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokedex
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
